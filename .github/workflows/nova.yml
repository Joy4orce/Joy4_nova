# check what is installed in ubuntu-latest https://github.com/actions/virtual-environments
name: NOVA CI
on:
  push:
    branches: [ nova ]
  pull_request:
    branches: [ nova ]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_HOME:   ${{ env.ANDROID_NDK_LATEST_HOME }}
      ANDROID_NDK_ROOT:   ${{ env.ANDROID_NDK_LATEST_HOME }}
    steps:
    - uses: actions/checkout@v4
    - name: setup java17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: install packages
      run: |
        sudo apt-get update || sudo apt-get update
        sudo apt-get install -y nasm meson ninja-build maven build-essential wget curl unzip git pkg-config
    - name: install repo
      run: |
        curl https://storage.googleapis.com/git-repo-downloads/repo | sudo tee /usr/local/bin/repo > /dev/null
        sudo chmod a+x /usr/local/bin/repo
    - name: retrieve full nova source
      run: |
         mkdir nova
         cd nova
         repo init -u https://github.com/nova-video-player/aos-AVP -b nova -m v6_4.xml
         repo sync -j 4
         repo forall -c 'git checkout -t $REPO_REMOTE/$REPO_RREV'
    - name: build
      run: |
        cd nova/Video
        ./gradlew aNR
