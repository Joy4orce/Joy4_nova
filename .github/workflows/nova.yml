# Builds a debug APK with audio file playback support and uploads it as a workflow artifact.
name: NOVA CI (audio fork)
on:
  push:
    branches: [ feature/audio-support ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_HOME:   ${ANDROID_NDK_LATEST_HOME}
      ANDROID_NDK_ROOT:   ${ANDROID_NDK_LATEST_HOME}
    steps:
    - uses: actions/checkout@v4
    - name: setup java17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: install packages
      run: |
        sudo apt-get update || sudo apt-get update
        sudo apt-get install -y nasm meson ninja-build maven build-essential wget curl unzip git pkg-config
    - name: install repo
      run: |
        curl https://storage.googleapis.com/git-repo-downloads/repo | sudo tee /usr/local/bin/repo > /dev/null
        sudo chmod a+x /usr/local/bin/repo
    - name: retrieve full nova source
      run: |
         git config --global user.email "powertjsl@gmail.com"
         git config --global user.name "Joy4orce"
         mkdir nova
         cd nova
         repo init -u https://github.com/Joy4orce/nova-audio-AVP -b feature/audio-support -m v6_4.xml
         repo sync -j 4
         repo forall -c 'git checkout -t $REPO_REMOTE/$REPO_RREV || true'
    - name: build debug apk
      run: |
        cd nova/Video
        ./gradlew assembleNoamazonDebug --no-daemon --stacktrace
    - name: upload apk
      uses: actions/upload-artifact@v4
      with:
        name: nova-audio-debug-apk
        path: nova/Video/build/outputs/apk/**/*.apk
        if-no-files-found: error
