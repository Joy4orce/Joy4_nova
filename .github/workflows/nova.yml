# Builds a debug APK with audio file playback support and uploads it as a workflow artifact.
name: NOVA CI (audio fork)
on:
  push:
    branches: [ feature/audio-support ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ANDROID_NDK_HOME:   ${ANDROID_NDK_LATEST_HOME}
      ANDROID_NDK_ROOT:   ${ANDROID_NDK_LATEST_HOME}
    steps:
    - uses: actions/checkout@v4
    - name: setup java17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: install packages
      run: |
        sudo apt-get update || sudo apt-get update
        sudo apt-get install -y nasm meson ninja-build maven build-essential wget curl unzip git pkg-config
    - name: install repo
      run: |
        curl https://storage.googleapis.com/git-repo-downloads/repo | sudo tee /usr/local/bin/repo > /dev/null
        sudo chmod a+x /usr/local/bin/repo
    - name: retrieve full nova source
      run: |
         git config --global user.email "powertjsl@gmail.com"
         git config --global user.name "Joy4orce"
         mkdir nova
         cd nova
         repo init -u https://github.com/Joy4orce/nova-audio-AVP -b feature/audio-support -m v6_4.xml
         repo sync -j 4
         repo forall -c 'git checkout -t $REPO_REMOTE/$REPO_RREV || true'
    - name: build debug apk (arm64-v8a only)
      run: |
        cd nova/Video
        ./gradlew assembleNoamazonDebug --no-daemon --stacktrace -PciAbi=arm64-v8a
    - name: upload apk
      uses: actions/upload-artifact@v4
      with:
        name: nova-audio-debug-apk
        path: nova/Video/build/outputs/apk/**/*-arm64-v8a-*.apk
        if-no-files-found: error
    - name: publish release
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Audio Support Build ${{ github.run_number }}
        body: |
          Debug APK (arm64-v8a) built from `feature/audio-support` @ ${{ github.sha }}

          Tap the `.apk` file below to install on your Android phone.
        files: nova/Video/build/outputs/apk/**/*-arm64-v8a-*.apk
        prerelease: true
